name: Build PWA to Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Récupération du code source
        uses: actions/checkout@v4

      - name: 2. Configuration de Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: gradle

      - name: 3. Configuration de l'Android SDK
        uses: android-actions/setup-android@v3

      - name: 4. Installer composants SDK
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager "platforms;android-33" "build-tools;33.0.2" "platform-tools"

      - name: 5. Télécharger Gradle Wrapper JAR
        run: |
          mkdir -p gradle/wrapper
          curl -fsSL -o gradle/wrapper/gradle-wrapper.jar \
            https://github.com/gradle/gradle/raw/v8.2.0/gradle/wrapper/gradle-wrapper.jar

      - name: 6. Rendre gradlew exécutable
        run: chmod +x gradlew

      - name: 7. Compilation APK Debug
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: 8. Publication APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30
